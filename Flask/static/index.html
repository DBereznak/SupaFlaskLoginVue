<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="app" class="container">
      <h1>{{mode === 'signup' ? 'Sign Up' : 'Log In'}}</h1>
      <section v-if="mode === 'signup'">
        <form @submit.prevent="signup">
          <div class="group">
            <label for="email">Email:</label>
            <input
              id="email"
              type="email"
              placeholder="Email"
              required
              v-model="email"
              @blur="checkEmail"
            />
          </div>
          <p class="warning" v-if="showError">Please input a valid email</p>
          <div class="group">
            <label for="password">Password:</label>
            <input id="password" type="password" v-model="password" />
          </div>
          <div class="group">
            <label for="confirm_password">Confirm Password:</label>
            <input
              id="confirm_password"
              type="password"
              v-model="confirm_password"
            />
          </div>
          <button class="action" type="submit">Signup</button>
        </form>
        <p v-if="nomatch">Passwords do not match</p>
        <button class="link" type="button" @click="mode = 'login'">
          Click Here if you already have an account
        </button>
      </section>
      <section v-if="mode === 'login'">
        <form @submit.prevent="login">
          <div class="group">
            <label for="email">Email:</label>
            <input id="email" type="text" placeholder="Email" v-model="email" />
          </div>
          <div class="group">
            <label for="password">Password:</label>
            <input id="password" type="password" v-model="password" />
          </div>
          <button class="action" type="submit">Login</button>
        </form>
        <button class="link" type="button" @click="mode = 'signup'">
          Click Here if you want to signup
        </button>
      </section>
    </div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const message = ref("Hello Vue!");
          const test = ref("test");
          const email = ref("");
          const password = ref("");
          const confirm_password = ref("");
          const nomatch = ref(false);
          const mode = ref("signup");
          const showError = ref(false);
          function checkEmail() {
            showError.value = !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
          }
          async function signup() {
            if (password.value !== confirm_password.value) {
              console.error("Passwords do not match");
              nomatch.value = true;
              password.value = "";
              confirm_password.value = "";
              return;
            } else {
              try {
                const response = await fetch("/signup", {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({
                    email: email.value,
                    password: password.value,
                  }),
                });
                const data = await response.json();
                console.log(data);
                nomatch.value = false;
                email.value = "";
                password.value = "";
                confirm_password.value = "";
                return data;
              } catch (error) {
                console.error("Error signing up:", error);
              }
            }
          }

          async function login() {
            console.log("Signing In");
          }
          async function fetchHealth() {
            try {
              const response = await fetch("/health");
              const data = await response.json();
              return data;
            } catch (error) {
              console.error("Error fetching data:", error);
            }
          }
          return {
            message,
            test,
            email,
            password,
            confirm_password,
            signup,
            nomatch,
            mode,
            checkEmail,
            showError,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
